<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>37 - Animations</title>
    <link rel="stylesheet" href="/src/css/03-css.css">
    <style>
        div.jungle {
            background: url(/src/imgs/jungle.png) no-repeat center;
            background-size: cover; /* Para que la imagen cubra todo el contenedor */
            border-radius: 4px;
            position: relative;
            margin-block: 1rem;
            height: 471px;
            width: 380px;
        }
        div.jungle img {
            position: absolute;
        }
        div.jungle img.logo {
            /* Centrado en la parte superior */
            top: 20px; /* Espacio desde arriba */
            left: 50%;
            transform: translateX(-50%); /* Centra horizontalmente */
            animation: 2s animLogo ease-out infinite;
            width: 150px; /* Ajusta el tamaño según necesites */
            height: auto;
        }
        div.jungle img.dk {
            width: 140px;
            left: 120px;
            top: 190px;
            animation: 2s animDK ease-in infinite;
        }
        div.jungle div.move {
            position: absolute;
            height: 105px;
            width: 140px;
            left: 0px;
            top: 305px;
            animation: 4s animRyno ease-out infinite;
        }
        div.jungle img.ryno {
            position: relative;
            width: 140px;
            left: 0px;
            top: 0px;
            animation: 0.4s animMove ease-in-out infinite;
        }

        @keyframes animLogo {
            0%,100% { transform: translateX(-50%) scale(1); } /* Mantiene el centrado */
            50%     { transform: translateX(-50%) scale(1.2); } /* Mantiene el centrado */
        }

        @keyframes animDK {
            0%  { top: 190px; transform: rotateX(0deg);   }
            40% { top: 100px; transform: rotateX(0deg);   }
            50% { top: 100px; transform: rotateX(360deg); }
            60% { top: 100px; transform: rotateX(360deg); }
           100% { top: 190px; transform: rotateX(360deg); }
        }

        @keyframes animMove {
            0%,100% { top: 0px; }
            50%     { top: -40px; }
        }

        @keyframes animRyno {
            0% {  left: 0px; transform: rotateY(0deg);  }
            40% { left: 240px; transform: rotateY(0deg) }
            50% { left: 240px; transform: rotateY(180deg) }
            80% { left: 0px; transform: rotateY(180deg) }
        }
    </style>
</head>
<body class="css">
    <nav>
        <a href="index.html">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 448 512"><!--!Font Awesome Free 6.5.2 by @fontawesome - https://fontawesome.com License - https://fontawesome.com/license/free Copyright 2024 Fonticons, Inc.--><path fill="#ffffff" d="M9.4 233.4c-12.5 12.5-12.5 32.8 0 45.3l160 160c12.5 12.5 32.8 12.5 45.3 0s12.5-32.8 0-45.3L109.2 288 416 288c17.7 0 32-14.3 32-32s-14.3-32-32-32l-306.7 0L214.6 118.6c12.5-12.5 12.5-32.8 0-45.3s-32.8-12.5-45.3 0l-160 160z"/></svg>
        </a>
    </nav>
    <main>
        <header>
            <h1> 37 - Animations </h1>
            <p>
                Lets an element gradually change from one style to another.
            </p>
        </header>
        <section>
            <section>
                <h3>Example:</h3>
                <div class="jungle">
                    <img class="logo" src="/src/imgs/logo-dk.png">
                    <img class="dk" src="/src/imgs/dk.png">
                    <div class="move">
                        <img class="ryno" src="/src/imgs/ryno.png">
                    </div>
                </div>
            </section>
        </section>
    </main>
</body>
</html>
