<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Canvas vs SVG</title>

    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #4B0082, #8A2BE2);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .contenedor {
            background: #1E1E2F;
            padding: 25px;
            border-radius: 10px;
            color: white;
            text-align: center;
            width: 260px;
            border: 2px solid #8A2BE2;
            box-shadow: 0 0 15px rgba(138, 43, 226, 0.5);
        }

        canvas {
            display: block;
            margin: 10px auto;
        }

        .boton-inicio {
            position: fixed;
            top: 20px;
            left: 20px;
            padding: 15px 25px;
            background-color: #8A2BE2;
            color: white;
            border: 3px solid white;
            border-radius: 10px;
            font-family: 'Press Start 2P', cursive;
            font-size: 14px;
            cursor: pointer;
            box-shadow: 0 4px 0 #5A1BB0;
            transition: all 0.2s;
        }

        .boton-inicio:hover {
            background-color: #5A1BB0;
        }

        .boton-inicio:active {
            transform: translateY(4px);
            box-shadow: 0 0 0 #666;
        }
    </style>
</head>

<body>

<div class="contenedor">

    <h2>Canvas:</h2>
    <canvas id="miCanvas" width="200" height="200"></canvas>

    <h2>SVG:</h2>
    <svg width="200" height="200">
        <defs>
            <radialGradient id="gradiente" cx="50%" cy="50%" r="50%">
                <stop offset="0%" stop-color="#8A2BE2"/>
                <stop offset="100%" stop-color="#4B0082"/>
            </radialGradient>
        </defs>

        <circle cx="100" cy="100" r="60" fill="url(#gradiente)" />
        
        <text x="100" y="105" text-anchor="middle" fill="white" font-size="16">
            ADSO
        </text>
    </svg>

    <button class="boton-inicio" onclick="accionBoton()">
        INICIO
    </button>

</div>

<script>
    window.onload = function() {
        const canvas = document.getElementById("miCanvas");
        const ctx = canvas.getContext("2d");

        // Gradiente morado
        const gradiente = ctx.createRadialGradient(100, 100, 20, 100, 100, 60);
        gradiente.addColorStop(0, "#8A2BE2");
        gradiente.addColorStop(1, "#4B0082");

        // Círculo
        ctx.beginPath();
        ctx.arc(100, 100, 60, 0, Math.PI * 2);
        ctx.fillStyle = gradiente;
        ctx.fill();
        ctx.closePath();
    };

    function accionBoton() {
        window.history.back();
    }
</script>

</body>
</html>
